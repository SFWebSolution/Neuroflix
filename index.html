  <script>
    

    // Splash delay (premium feel)
    setTimeout(() => {

        if (user) {
          // Admin check
          if (user.email === "neuro_stack@outlook.com") {
            window.location.href = "admin.html";
          } else {
            window.location.href = "dashboard.html";

          window.location.href = "login.html";

      });
